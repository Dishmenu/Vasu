<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#fff9f3;
padding:30px;
}

h2{color:#c62828}

input{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
background:#c62828;
color:white;
cursor:pointer;
margin-top:6px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

img{
width:70px;
height:70px;
object-fit:cover;
border-radius:6px;
}

</style>

</head>

<body>


<div id="loginBox">

<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

</div>



<div id="panel" style="display:none">

<h2>Admin Panel</h2>

<button id="logoutBtn">Logout</button>

<hr>

<h3>Add Product</h3>

<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pcategory" placeholder="Category">
<input type="file" id="pimage">

<button onclick="addProduct()">Add Product</button>

<hr>

<h3>Products</h3>
<div id="products"></div>

<hr>

<h3>Orders</h3>
<div id="orders"></div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
updateDoc,
deleteDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";



/* CONFIG */

const firebaseConfig={
apiKey:"AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
authDomain:"reddy-gari-biryani.firebaseapp.com",
projectId:"reddy-gari-biryani"
};
const CLOUD_NAME="ddf7lhtbe";
const UPLOAD_PRESET="menu_upload";




const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);



/* LOGIN */

document.getElementById("loginBtn").onclick = async () => {

const email=document.getElementById("email").value;
const pass=document.getElementById("password").value;

try{
await signInWithEmailAndPassword(auth,email,pass);
}catch(e){
alert("Login failed");
}

};



/* AUTO LOGIN */

onAuthStateChanged(auth,user=>{

if(user){

loginBox.style.display="none";
panel.style.display="block";

loadProducts();
loadOrders();

}

});



/* LOGOUT */

logoutBtn.onclick = async () => {

await signOut(auth);
location.reload();

};



/* CLOUDINARY UPLOAD */

async function uploadImage(file){

const data=new FormData();

data.append("file",file);
data.append("upload_preset",UPLOAD_PRESET);

const res=await fetch(
"https://api.cloudinary.com/v1_1/"+CLOUD_NAME+"/image/upload",
{method:"POST",body:data}
);

const json=await res.json();

return json.secure_url;

}



/* ADD PRODUCT */

window.addProduct = async function(){

const name=pname.value;
const price=pprice.value;
const category=pcategory.value;
const file=pimage.files[0];

if(!file){alert("Select image");return;}

const img=await uploadImage(file);

await addDoc(collection(db,"menu"),{

name,
price:Number(price),
category,
image:img,
available:true

});

};



/* PRODUCTS LIST */

function loadProducts(){

onSnapshot(collection(db,"menu"),snap=>{

products.innerHTML="";

snap.forEach(d=>{

const p=d.data();

products.innerHTML+=`

<div class="card">

<img src="${p.image}">

<p>${p.name}</p>
<p>₹${p.price}</p>

<button onclick="toggle('${d.id}',${p.available})">
${p.available?"Disable":"Enable"}
</button>

<button onclick="removeProduct('${d.id}')">
Delete
</button>

</div>

`;

});

});

}



/* ENABLE DISABLE */

window.toggle = async (id,state)=>{

await updateDoc(doc(db,"menu",id),{
available:!state
});

};



/* DELETE PRODUCT */

window.removeProduct = async (id)=>{

if(confirm("Delete product?"))
await deleteDoc(doc(db,"menu",id));

};



/* LOAD ORDERS */

function loadOrders(){

onSnapshot(collection(db,"orders"),snap=>{

orders.innerHTML="";

snap.forEach(d=>{

const o=d.data();

if(o.status==="delivered") return;

let items="";

o.items.forEach(i=>{
items+=i.name+" x "+i.qty+"<br>";
});

orders.innerHTML+=`

<div class="card">

<p><b>${d.id}</b></p>

<p>${items}</p>

<p>Status: ${o.status}</p>

<button onclick="setStatus('${d.id}','accepted')">
Accept
</button>

<button onclick="setStatus('${d.id}','preparing')">
Prepare
</button>

<button onclick="setStatus('${d.id}','out_for_delivery')">
Out
</button>

<button onclick="setStatus('${d.id}','delivered')">
Delivered
</button>

</div>

`;

});

});

}



/* UPDATE ORDER STATUS */

window.setStatus = async (id,status)=>{

await updateDoc(doc(db,"orders",id),{
status
});

};

</script>

</body>
</html>

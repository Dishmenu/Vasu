<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Menu</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
margin:0;
background:#fafafa;
}

/* HEADER */

header{
background:#c62828;
color:white;
padding:15px;
text-align:center;
position:sticky;
top:0;
z-index:100;
}

/* SEARCH */

.searchBox{
padding:15px;
text-align:center;
}

.searchBox input{
width:90%;
max-width:420px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* CATEGORY */

.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px 15px;
}

.categories button{
padding:8px 14px;
border:none;
border-radius:20px;
background:#eee;
cursor:pointer;
}

.categories button.active{
background:#c62828;
color:white;
}

/* GRID */

.menu-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

/* CARD */

.menu-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.menu-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

/* BUTTON */

.addBtn{
background:#c62828;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
margin-top:6px;
}

/* CART */

.cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#c62828;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

.cartCount{
position:absolute;
top:-5px;
right:-5px;
background:#ffcc00;
color:black;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

/* RESPONSIVE */

@media(max-width:900px){
.menu-grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:600px){
.menu-grid{grid-template-columns:1fr}
}

</style>

</head>

<body>

<header>
<h2>Reddy Gari Biryani</h2>
</header>

<!-- SEARCH -->

<div class="searchBox">
<input id="searchInput" placeholder="Search food">
</div>

<!-- CATEGORY -->

<div class="categories">

<button class="active" data-cat="all">All</button>
<button data-cat="biryani">Biryani</button>
<button data-cat="starters">Starters</button>
<button data-cat="fry">Fry</button>
<button data-cat="drinks">Drinks</button>

</div>

<!-- MENU -->

<div class="menu-grid" id="menuGrid"></div>

<!-- CART BUTTON -->

<div class="cartBtn" onclick="openCart()">

🛒

<span id="cartCount" class="cartCount">0</span>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig={
apiKey: "AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
authDomain: "reddy-gari-biryani.firebaseapp.com",
projectId: "reddy-gari-biryani"
};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const menuGrid=document.getElementById("menuGrid");

let items=[];
let cart=JSON.parse(localStorage.getItem("cart"))||[];

/* LOAD MENU */

async function loadMenu(){

const snap=await getDocs(collection(db,"menu"));

items=[];

snap.forEach(docSnap=>{

const d=docSnap.data();

if(!d.available) return;

items.push(d);

});

renderMenu(items);

}

loadMenu();

/* RENDER MENU */

function renderMenu(list){

menuGrid.innerHTML="";

list.forEach(i=>{

const card=document.createElement("div");

card.className="menu-card";

card.innerHTML=`

<img src="${i.image}">

<h3>${i.name}</h3>

<p>${i.category}</p>

<p>₹${i.price}</p>

<button class="addBtn"
onclick="addCart('${i.name}',${i.price},'${i.image}')">
Add
</button>

`;

menuGrid.appendChild(card);

});

}

/* CART */

window.addCart=(name,price,image)=>{

const existing=cart.find(i=>i.name===name);

if(existing){
existing.qty++;
}else{
cart.push({name,price,img:image,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

};

function updateCartCount(){

let total=0;

cart.forEach(i=>total+=i.qty);

document.getElementById("cartCount").innerText=total;

}

updateCartCount();

/* OPEN CART */

window.openCart=()=>{

window.location.href="cart.html";

}

/* SEARCH */

searchInput.addEventListener("input",e=>{

const val=e.target.value.toLowerCase();

const filtered=items.filter(i=>
i.name.toLowerCase().includes(val)
);

renderMenu(filtered);

});

/* CATEGORY FILTER */

document.querySelectorAll(".categories button")
.forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".categories button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

const cat=btn.dataset.cat;

if(cat==="all"){
renderMenu(items);
}else{
renderMenu(items.filter(i=>i.category===cat));
}

};

});

</script>

</body>
</html>

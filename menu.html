<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Menu</title>

<link rel="stylesheet" href="menu.css">

</head>

<body>

<section class="menu-page">

<div class="menu-search-box">
<input type="text" id="searchInput" placeholder="Search items">
</div>

<div class="menu-categories">

<button class="cat-btn active" data-category="all">All</button>
<button class="cat-btn" data-category="biryani">Biryani</button>
<button class="cat-btn" data-category="starters">Starters</button>
<button class="cat-btn" data-category="fry">Fry</button>
<button class="cat-btn" data-category="family">Family</button>
<button class="cat-btn" data-category="drinks">Drinks</button>

</div>

<div class="menu-grid" id="menuGrid"></div>

<a href="cart.html" class="floating-cart">
🛒
<span id="cartCount">0</span>
</a>

</section>

<div id="toast"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
authDomain: "reddy-gari-biryani.firebaseapp.com",
projectId: "reddy-gari-biryani",

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const menuGrid = document.getElementById("menuGrid");

async function loadMenu(){

const snap = await getDocs(collection(db,"menu"));

menuGrid.innerHTML="";

snap.forEach(docSnap=>{

const item = docSnap.data();

if(!item.available) return;

const category = (item.category || "other").toLowerCase();

const card=document.createElement("div");

card.className="menu-card";
card.dataset.category=category;
card.dataset.price=item.price;

card.innerHTML=`

<img class="menu-img" src="${item.image}">

<div class="menu-info">

<h3>${item.name}</h3>

<p class="short-desc">${item.desc || ""}</p>

<div class="row-info">

<p class="price">₹${item.price}</p>

<div class="qty-row">

<button class="qty-btn minus">-</button>

<input class="qty-input" type="number" value="1" min="1">

<button class="qty-btn plus">+</button>

</div>

</div>

<button class="addcart-btn">Add to Cart</button>

</div>
`;

menuGrid.appendChild(card);

attachEvents(card);

});

}

loadMenu();

function attachEvents(card){

const basePrice=parseInt(card.dataset.price);

const priceEl=card.querySelector(".price");
const qtyInput=card.querySelector(".qty-input");

card.querySelector(".plus").onclick=()=>{
qtyInput.value++;
priceEl.textContent="₹"+(qtyInput.value*basePrice);
};

card.querySelector(".minus").onclick=()=>{
if(qtyInput.value>1){
qtyInput.value--;
priceEl.textContent="₹"+(qtyInput.value*basePrice);
}
};

card.querySelector(".addcart-btn").onclick=()=>{

const name=card.querySelector("h3").textContent;
const img=card.querySelector(".menu-img").src;
const price=basePrice;
const qty=parseInt(qtyInput.value);

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let existing=cart.find(i=>i.name===name);

if(existing){
existing.qty+=qty;
}else{
cart.push({name,img,price,qty});
}

localStorage.setItem("cart",JSON.stringify(cart));

updateCartCount();

showToast(name+" added");

};

}

function updateCartCount(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let total=0;

cart.forEach(i=>total+=i.qty);

document.getElementById("cartCount").textContent=total;

}

updateCartCount();

function showToast(msg){

const toast=document.getElementById("toast");

toast.textContent=msg;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},1500);

}

document.querySelectorAll(".cat-btn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

const cat=btn.dataset.category;

document.querySelectorAll(".menu-card").forEach(card=>{

const itemCat=card.dataset.category;

card.style.display=(cat==="all"||itemCat===cat)?"flex":"none";

});

};

});

document.getElementById("searchInput").addEventListener("input",()=>{

const val=searchInput.value.toLowerCase();

document.querySelectorAll(".menu-card").forEach(card=>{

const name=card.querySelector("h3").textContent.toLowerCase();

card.style.display=name.includes(val)?"flex":"none";

});

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>

/* BODY */

body{
font-family:Poppins,sans-serif;
background:#fff9f3;
margin:0;
padding:20px;
}

/* HEADER */

.topbar{
display:flex;
justify-content:center;
margin-bottom:15px;
}

.search{
width:320px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}
/* CATEGORY FILTER */

.categories{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}
.cat-btn{
padding:6px 12px;
background:white;
border:1px solid #ddd;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.cat-btn.active{
background:#c62828;
color:white;
}

/* GRID */

.menu-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

/* CARD */

.menu-card{
background:white;
border-radius:14px;
padding:15px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
text-align:center;
}

/* IMAGE */

.menu-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

/* NAME */

.name{
font-weight:600;
margin-top:6px;
}

/* CATEGORY */

.category{
font-size:12px;
color:#666;
margin-top:4px;
}

/* PRICE ROW */

.row{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:8px;
}

/* PRICE */

.price{
color:#c62828;
font-weight:600;
}

/* QTY */

.qty{
display:flex;
align-items:center;
gap:8px;
}

.qty button{
width:26px;
height:26px;
border:none;
background:#c62828;
color:white;
border-radius:6px;
cursor:pointer;
}

/* ADD BUTTON */

.add-btn{
width:100%;
padding:10px;
background:#c62828;
color:white;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}
.added-msg{
font-size:12px;
color:green;
margin-top:5px;
height:14px;
}
/* FLOATING CART */

.cart-float{
position:fixed;
bottom:20px;
right:20px;
background:#c62828;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
box-shadow:0 4px 14px rgba(0,0,0,0.2);
}

.cart-count{
position:absolute;
top:-6px;
right:-6px;
background:black;
color:white;
font-size:12px;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

/* MOBILE */

@media(max-width:768px){

.menu-grid{
grid-template-columns:1fr;
}

.menu-card{
display:grid;
grid-template-columns:120px 1fr;
gap:10px;
text-align:left;
}

.menu-card img{
height:110px;
}

}

</style>

</head>

<body>


<input
id="searchInput"
class="search"
placeholder="Search food">

</div>


<div id="categories" class="categories"></div>


<div id="menuGrid" class="menu-grid"></div>


<div class="cart-float" onclick="openCart()">

🛒

<div id="cartCount" class="cart-count">0</div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


/* FIREBASE */

const firebaseConfig={
apiKey:"AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
authDomain:"reddy-gari-biryani.firebaseapp.com",
projectId:"reddy-gari-biryani"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);


/* DATA */

let allItems=[];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let qtyMap={};
let activeCategory="all";


/* CART COUNT */

function updateCartCount(){

let count=0;

cart.forEach(i=>count+=i.qty);

document.getElementById("cartCount").innerText=count;

}

updateCartCount();


/* LOAD MENU */

async function loadMenu(){

const snap=await getDocs(collection(db,"menu"));

allItems=[];

snap.forEach(d=>{
const item=d.data();
if(item.available) allItems.push(item);
});

createCategories();
renderMenu();

}

loadMenu();


/* CATEGORY BUTTONS */

function createCategories(){

const cats=[...new Set(allItems.map(i=>i.category))];

const box=document.getElementById("categories");

box.innerHTML=`<div class="cat-btn active" onclick="setCategory('all')">All</div>`;

cats.forEach(c=>{

box.innerHTML+=`<div class="cat-btn" onclick="setCategory('${c}')">${c}</div>`;

});

}


/* SET CATEGORY */

window.setCategory=function(cat){

activeCategory=cat;

document.querySelectorAll(".cat-btn")
.forEach(b=>b.classList.remove("active"));

event.target.classList.add("active");

renderMenu();

}


/* SEARCH */

document.getElementById("searchInput")
.addEventListener("input",renderMenu);


/* RENDER */

function renderMenu(){

const grid=document.getElementById("menuGrid");

const search=document
.getElementById("searchInput")
.value.toLowerCase();

grid.innerHTML="";

allItems
.filter(i=>{

if(activeCategory!=="all" && i.category!==activeCategory)
return false;

if(!i.name.toLowerCase().includes(search))
return false;

return true;

})
.forEach(i=>{

qtyMap[i.name]=qtyMap[i.name]||1;

grid.innerHTML+=`

<div class="menu-card">

<img src="${i.image}">

<div>

<div class="name">${i.name}</div>

<div class="category">${i.category}</div>

<div class="row">

<div class="price" id="price-${i.name}">₹${i.price}</div>

<div class="qty">

<button onclick="changeQty('${i.name}',-1)">-</button>

<span id="qty-${i.name}">${qtyMap[i.name]}</span>

<button onclick="changeQty('${i.name}',1)">+</button>

</div>

</div>

<button class="add-btn"
onclick="addCart('${i.name}',${i.price},'${i.image}')">

Add

</button>
<div id="added-${i.name}" class="added-msg"></div>

</div>

</div>

`;

});

}


/* QTY */

window.changeQty=function(name,val){

qtyMap[name]+=val

if(qtyMap[name]<1) qtyMap[name]=1

document.getElementById("qty-"+name).innerText=qtyMap[name]

/* UPDATE PRICE */

const item = allItems.find(i=>i.name===name)

const newPrice = item.price * qtyMap[name]

document.getElementById("price-"+name).innerText = "₹"+newPrice

}

/* ADD CART */

window.addCart=function(name,price,image){

const qty = qtyMap[name]

const exist = cart.find(i=>i.name===name)

if(exist){
exist.qty += qty
}else{
cart.push({
name,
price,
image,
qty
})
}

localStorage.setItem("cart",JSON.stringify(cart))

updateCartCount()

/* SHOW ADDED MESSAGE */

const msg=document.getElementById("added-"+name)

msg.innerText="Added ✓"

setTimeout(()=>{
msg.innerText=""
},1000)

}
/* OPEN CART */

window.openCart=function(){

window.location.href="cart.html";

}

</script>

</body>
</html>

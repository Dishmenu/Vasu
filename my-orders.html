<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#fff9f3;
padding:40px 6%;
}

h2{
text-align:center;
margin-bottom:25px;
color:#c62828;
}

.order{
background:white;
padding:20px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.order p{
margin:5px 0;
}

.status{
color:#c62828;
font-weight:600;
}

button{
margin-top:10px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#c62828;
color:white;
cursor:pointer;
}

.empty{
text-align:center;
margin-top:40px;
font-size:18px;
}

</style>

</head>

<body>

<h2>My Orders</h2>

<div id="ordersList"></div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
authDomain:"reddy-gari-biryani.firebaseapp.com",
projectId:"reddy-gari-biryani"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


const ordersBox = document.getElementById("ordersList");


async function loadOrders(){

const history = JSON.parse(localStorage.getItem("historyOrders")) || [];

if(history.length === 0){

ordersBox.innerHTML = "<div class='empty'>No orders found</div>";
return;

}

ordersBox.innerHTML = "Loading orders...";

let html="";

for(const orderId of history){

try{

const snap = await getDoc(doc(db,"orders",orderId));

if(!snap.exists()) continue;

const d = snap.data();

html += `
<div class="order">

<p><b>Order ID:</b> ${orderId}</p>

<p><b>Total:</b> ₹${d.total}</p>

<p class="status">Status: ${d.status}</p>

<p><b>Date:</b> ${new Date(d.timestamp).toLocaleString()}</p>

<button onclick="track('${orderId}')">
Track Order
</button>

</div>
`;

}catch(e){

console.error(e);

}

}

if(html===""){
ordersBox.innerHTML = "<div class='empty'>No orders found</div>";
}else{
ordersBox.innerHTML = html;
}

}


window.track = function(orderId){

localStorage.setItem("trackOrderId",orderId);
window.location.href="order-track.html";

}


loadOrders();

</script>

</body>
</html>

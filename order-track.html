<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Track Order</title>

<style>

body{
font-family:Poppins,sans-serif;
padding:40px;
background:#fff9f3;
text-align:center;
}

.track-box{
background:white;
padding:30px;
border-radius:16px;
max-width:420px;
margin:auto;
box-shadow:0 4px 16px rgba(0,0,0,0.1);
}

.status{
font-size:20px;
font-weight:600;
color:#c62828;
margin-top:10px;
}

</style>

</head>

<body>

<div class="track-box">

<h2>Track Order</h2>

<p id="orderId">Loading...</p>

<p>Status:</p>

<div class="status" id="status">Loading...</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
doc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
  authDomain:"reddy-gari-biryani.firebaseapp.com",
  projectId:"reddy-gari-biryani"
});

const db = getFirestore(app);

const params =
new URLSearchParams(window.location.search);

const orderId = params.get("orderId");

document.getElementById("orderId").innerText =
"Order ID: "+orderId;

onSnapshot(doc(db,"orders",orderId),(snap)=>{

if(!snap.exists()) return;

const d = snap.data();

document.getElementById("status").innerText =
d.status;

});

if(!orderId){
document.getElementById("status").innerText="Invalid Order ID";
throw new Error("No orderId");
}
</script>

</body>
</html>

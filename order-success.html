<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Order Success</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#fff9f3;
padding:40px 6%;
text-align:center;
}

.success-box{
background:white;
padding:30px;
border-radius:16px;
max-width:450px;
margin:auto;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

.order-id{
font-size:22px;
color:#c62828;
font-weight:600;
margin:20px 0;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:15px;
cursor:pointer;
}

.track-btn{
background:#c62828;
color:white;
}

.wp-btn{
background:#25D366;
color:white;
}

.home-btn{
background:#ddd;
}

</style>

</head>

<body>

<div class="success-box">

<h2>Order Placed Successfully</h2>

<p>Your Order ID</p>

<div id="orderIdBox" class="order-id">
Loading...
</div>

<button class="track-btn" onclick="trackOrder()">
Track Order
</button>

<button class="wp-btn" onclick="sendWhatsApp()">
Send Order on WhatsApp
</button>

<button class="home-btn" onclick="goHome()">
Back to Home
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"

import { getFirestore,doc,getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
authDomain:"reddy-gari-biryani.firebaseapp.com",
projectId:"reddy-gari-biryani"
};

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

/* GET ORDER ID */

const orderId = localStorage.getItem("lastOrderId")

const box=document.getElementById("orderIdBox")

if(!orderId){
box.innerText="Order ID not found"
}else{
box.innerText=orderId
}

/* TRACK */

window.trackOrder = function(){

window.location.href="order-track.html"

}

/* WHATSAPP */

window.sendWhatsApp = async function(){

const orderId = localStorage.getItem("lastOrderId")

if(!orderId){
alert("Order ID not found")
return
}

const snap = await getDoc(doc(db,"orders",orderId))

if(!snap.exists()){
alert("Order not found")
return
}

const d = snap.data()

let msg = "Order ID: "+orderId+"\n\n"

msg += "Items:\n"

d.items.forEach(i=>{
msg += i.name+" x "+i.qty+"\n"
})

msg += "\nAddress: "+d.address

window.open(
"https://wa.me/919908500325?text="+encodeURIComponent(msg)
)

}
/* HOME */

window.goHome = function(){

window.location.href="menu.html"

}
</script>

</body>
</html>

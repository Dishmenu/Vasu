<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Your Cart</title>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#fff9f3;
padding:30px 6%;
}

/* HEADER */

header{
font-size:26px;
font-weight:600;
margin-bottom:25px;
}

/* CART GRID */

.cart-items{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

/* CARD */

.cart-card{
display:grid;
grid-template-columns:120px 1fr;
gap:14px;
background:white;
padding:14px;
border-radius:16px;
box-shadow:0 4px 16px rgba(0,0,0,0.06);
align-items:center;
}

.cart-card img{
width:120px;
height:120px;
border-radius:12px;
object-fit:cover;
}

/* INFO */

.cart-info h3{
font-size:17px;
margin-bottom:6px;
}

.price{
color:#c62828;
font-weight:600;
margin-bottom:8px;
}

/* QTY */

.qty-row{
display:flex;
align-items:center;
gap:8px;
margin-bottom:8px;
}

.qty-btn{
width:28px;
height:28px;
border:none;
background:#c62828;
color:white;
border-radius:6px;
cursor:pointer;
font-size:18px;
}

.qty-number{
min-width:20px;
text-align:center;
}

/* REMOVE */

.remove{
border:none;
background:none;
color:#e53935;
font-size:13px;
cursor:pointer;
text-decoration:underline;
}

/* SUMMARY */

.summary{
margin-top:30px;
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 4px 16px rgba(0,0,0,0.08);
}

.summary-row{
display:flex;
justify-content:space-between;
font-size:18px;
margin-bottom:15px;
}

/* CHECKOUT BUTTON */

.checkout-btn{
width:100%;
padding:14px;
border:none;
background:#c62828;
color:white;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

/* EMPTY */

.empty{
text-align:center;
font-size:18px;
padding:40px;
}

/* MOBILE */

@media(max-width:768px){

.cart-items{
grid-template-columns:1fr;
}

.cart-card{
grid-template-columns:100px 1fr;
}

.cart-card img{
width:100px;
height:100px;
}

}

</style>

</head>

<body>

<header>Your Cart</header>

<div id="cartItems" class="cart-items"></div>

<div class="summary">

<div class="summary-row">
<span>Subtotal</span>
<span id="subtotal">₹0</span>
</div>

<button class="checkout-btn" onclick="goCheckout()">
Proceed to Checkout →
</button>

</div>


<script>

/* CART STRUCTURE
{name, price, image, qty}
*/

let cart = JSON.parse(localStorage.getItem("cart")) || []

const cartBox = document.getElementById("cartItems")
const subtotalEl = document.getElementById("subtotal")

renderCart()

function renderCart(){

cartBox.innerHTML=""

let total = 0

if(cart.length===0){

cartBox.innerHTML="<div class='empty'>Your cart is empty</div>"
subtotalEl.innerText="₹0"
return

}

cart.forEach((item,index)=>{

let itemTotal = item.price * item.qty

total += itemTotal

cartBox.innerHTML += `

<div class="cart-card">

<img src="${item.image}">

<div class="cart-info">

<h3>${item.name}</h3>

<div class="price">₹${item.price}</div>

<div class="qty-row">

<button class="qty-btn"
onclick="changeQty(${index},-1)">−</button>

<span class="qty-number">${item.qty}</span>

<button class="qty-btn"
onclick="changeQty(${index},1)">+</button>

</div>

<button class="remove"
onclick="removeItem(${index})">
Remove
</button>

</div>

</div>

`

})

subtotalEl.innerText="₹"+total

}

/* UPDATE QTY */

function changeQty(index,val){

cart[index].qty += val

if(cart[index].qty < 1){
cart[index].qty = 1
}

saveCart()
renderCart()

}

/* REMOVE */

function removeItem(index){

cart.splice(index,1)

saveCart()
renderCart()

}

/* SAVE CART */

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart))
}

/* CHECKOUT */

function goCheckout(){

if(cart.length===0){
alert("Cart is empty")
return
}

window.location.href="checkout.html"

}

</script>

</body>
</html>

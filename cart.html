<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu - Reddy Gari Biryani</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"><style
</head>
<style>
body {
  margin: 0;
  font-family: Poppins, sans-serif;
  background: #fff9f3;
}

.cart-page {
  padding: 40px 6%;
}

h2 {
  font-size: 28px;
  margin-bottom: 30px;
}

.cart-items {
  display: grid;
  grid-template-columns: repeat(2, 1fr); /* 2 cards per row */
  gap: 16px;
}
/* CART ITEM CARD */
.cart-item {
  display: grid;
  grid-template-columns: 120px 1fr 120px 140px 80px;
  align-items: center;
  gap: 20px;
  padding: 14px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}

/* IMAGE */
.cart-item img {
  width: 120px;
  height: 120px;
  border-radius: 14px;
  object-fit: cover;
}

/* NAME */
.cart-title {
  font-size: 18px;
  font-weight: 600;
}

/* PRICE */
.cart-price {
  font-size: 20px;
  font-weight: 700;
  color: #c62828;
}

/* QTY */
.qty-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.qty-btn {
  width: 30px;
  height: 30px;
  background: #c62828;
  border-radius: 6px;
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
}

.qty-input {
  width: 45px;
  text-align: center;
  font-size: 16px;
  border: 2px solid #ddd;
  border-radius: 6px;
}

/* REMOVE */
.remove-btn {
  background: none;
  border: none;
  color: #ff4444;
  font-size: 14px;
  cursor: pointer;
  text-decoration: underline;
}

/* SUMMARY */
.cart-summary {
  margin-top: 30px;
  padding: 20px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}

.cart-summary p {
  font-size: 20px;
  margin-bottom: 20px;
}

.checkout-btn {
  display: block;
  text-align: center;
  padding: 14px 0;
  background: #c62828;
  color: white;
  border-radius: 12px;
  text-decoration: none;
  font-size: 18px;
  font-weight: 700;
}

/* MOBILE */
/* MOBILE SPLIT CARD FIX */
@media (max-width: 768px) {
  .cart-items {
    grid-template-columns: 1fr;
  }
  .menu-card {
    flex-direction: row;
    align-items: flex-start;
    gap: 14px;
    text-align: left;
    padding: 12px;
  }

  .menu-img {
    width: 110px;
    height: 110px;
    border-radius: 12px;
    object-fit: cover;
  }

  .menu-info {
    flex: 1;
  }

  .menu-info h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .row-info {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 14px;
    margin-bottom: 6px;
  }

  .price {
    font-size: 16px;
    font-weight: 700;
  }

  .qty-row {
    gap: 6px;
  }

  .qty-btn {
    width: 26px;
    height: 26px;
    font-size: 18px;
    border-radius: 5px;
  }

  .qty-input {
    width: 40px;
    font-size: 14px;
    padding: 4px;
  }

  .addcart-btn {
    padding: 8px 0;
    font-size: 14px;
    border-radius: 10px;
  }
}
</style> 
<body>

<section class="cart-page">

  <h2>Your Cart</h2>

  <div id="cartItems" class="cart-items"></div>

  <div class="cart-summary">
    <p>Subtotal: <span id="subtotal">₹0</span></p>
    <a href="checkout.html" class="checkout-btn">Proceed to Checkout →</a>
  </div>

</section>

<script>
/* LOAD CART FROM STORAGE */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartItemsDiv = document.getElementById("cartItems");
const subtotalEl = document.getElementById("subtotal");
const cartCount = document.getElementById("cartCount");

/* INITIAL RENDER */
renderCart();
updateCartCount();


/* -------------------------
   RENDER CART ITEMS
------------------------- */
function renderCart() {

  cartItemsDiv.innerHTML = "";

  let subtotal = 0;

  if (cart.length === 0) {
    cartItemsDiv.innerHTML = "<p>Your cart is empty</p>";
    subtotalEl.textContent = "₹0";
    return;
  }

  cart.forEach((item, index) => {

    const itemTotal = item.price * item.qty;

    subtotal += itemTotal;

    cartItemsDiv.innerHTML += `
      <div class="cart-item">

        <img src="${item.img}" alt="${item.name}">

        <div class="cart-details">
          <h3>${item.name}</h3>

          <p class="price">₹${itemTotal}</p>

          <div class="qty-row">

            <button class="qty-btn minus"
              onclick="updateQty(${index}, -1)">
              -
            </button>

            <input
              type="number"
              class="qty-input"
              min="1"
              value="${item.qty}"
              onchange="setQty(${index}, this.value)"
            >

            <button class="qty-btn plus"
              onclick="updateQty(${index}, 1)">
              +
            </button>

          </div>

          <button class="remove-btn"
            onclick="removeItem(${index})">
            Remove
          </button>

        </div>

      </div>
    `;

  });

  subtotalEl.textContent = "₹" + subtotal;

}


/* -------------------------
   UPDATE QUANTITY + / -
------------------------- */
function updateQty(index, change) {

  cart[index].qty += change;

  if (cart[index].qty < 1) {
    cart[index].qty = 1;
  }

  saveCart();
  renderCart();
}


/* -------------------------
   MANUAL QUANTITY INPUT
------------------------- */
function setQty(index, value) {

  let qty = parseInt(value);

  if (isNaN(qty) || qty < 1) {
    qty = 1;
  }

  cart[index].qty = qty;

  saveCart();
  renderCart();
}


/* -------------------------
   REMOVE ITEM
------------------------- */
function removeItem(index) {

  cart.splice(index, 1);

  saveCart();
  renderCart();
}


/* -------------------------
   SAVE CART
------------------------- */
function saveCart() {

  localStorage.setItem("cart", JSON.stringify(cart));

  updateCartCount();

}


/* -------------------------
   UPDATE CART COUNT
------------------------- */
function updateCartCount() {

  if (!cartCount) return;

  let totalItems = 0;

  cart.forEach(item => {
    totalItems += item.qty;
  });

  cartCount.textContent = totalItems;

}
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; padding:40px 6%; font-family:Poppins, sans-serif; background:#fff9f3; }
    .checkout-page h2 { text-align:center; margin-bottom:25px; }
    .checkout-container { display:flex; gap:25px; }
    .order-summary, .checkout-form {
      background:#fff; padding:20px; border-radius:16px;
      box-shadow:0 4px 18px rgba(0,0,0,0.08);
    }
    .order-summary { width:40%; }
    .checkout-form { width:60%; }
    .summary-item { display:flex; justify-content:space-between; margin-bottom:8px; }
    .summary-total { display:flex; justify-content:space-between; font-weight:700; margin-top:12px; }
    input, textarea { width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; margin-bottom:10px; }
    .payment-options { margin-top:15px; }
    .pay-option { display:flex; align-items:center; padding:8px 0; }
    .pay-icon { font-size:22px; margin-right:8px; }
    button { width:100%; padding:14px; background:#c62828; color:#fff; border:none; border-radius:12px; margin-top:10px; }
    @media(max-width:768px) { .checkout-container { flex-direction:column; } .order-summary, .checkout-form { width:100%; } }
  </style>
</head>
<body>

<section class="checkout-page">
  <h2>Checkout</h2>

  <div class="checkout-container">

    <div class="order-summary">
      <h3>Your Order</h3>
      <div id="summaryItems"></div>
      <div class="summary-total">
        <p>Subtotal:</p>
        <p id="summaryTotal">₹0</p>
      </div>
    </div>

    <div class="checkout-form">
      <h3>Delivery Details</h3>

      <label>Full Name</label>
      <input id="name">

      <label>Phone</label>
      <input id="phone">

      <label>Address</label>
      <textarea id="address"></textarea>

      <h3>Payment Method</h3>

      <div class="payment-options">

        <label class="pay-option">
          <input type="radio" name="paymethod" value="cod" checked>
          <span class="pay-icon">💵</span> Cash on Delivery
        </label>

        <label class="pay-option">
          <input type="radio" name="paymethod" value="online">
          <span class="pay-icon">💳</span> Online Payment
        </label>

      </div>

      <button onclick="payAndPlaceOrder()">Pay & Place Order</button>
    </div>

  </div>
</section>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
  authDomain: "reddy-gari-biryani.firebaseapp.com",
  projectId: "reddy-gari-biryani",
  storageBucket: "reddy-gari-biryani.appspot.com",
  messagingSenderId: "83117980930",
  appId: "1:83117980930:web:5672bbedf6f8aafb88961b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderSummary() {
  let total = 0;
  let html = "";

  cart.forEach(i => {
    const t = i.qty * i.price;
    total += t;
    html += `<div class="summary-item"><span>${i.name} × ${i.qty}</span><span>₹${t}</span></div>`;
  });

  document.getElementById("summaryItems").innerHTML = html;
  document.getElementById("summaryTotal").textContent = "₹" + total;
}
renderSummary();

window.payAndPlaceOrder = async function () {

  const nameVal = document.getElementById("name").value.trim();
  const phoneVal = document.getElementById("phone").value.trim();
  const addressVal = document.getElementById("address").value.trim();

  if (!nameVal || !phoneVal || !addressVal) {
    alert("Please fill all fields.");
    return;
  }

  const method = document.querySelector("input[name='paymethod']:checked").value;
  const total = Number(document.getElementById("summaryTotal").textContent.replace("₹",""));
  const orderId = Date.now().toString();

  // COD
  if (method === "cod") {
    await setDoc(doc(db,"orders",orderId), {
      name: nameVal,
      phone: phoneVal,
      address: addressVal,
      items: cart,
      total,
      payMethod: "COD",
      paymentStatus: "pending",
      status: "pending",
      timestamp: Date.now()
    });

    localStorage.setItem("lastOrderId", orderId);
    localStorage.removeItem("cart");

    window.location.href = "order-success.html";
    return;
  }

  // RAZORPAY
  var options = {
    key: "rzp_test_SMgRiOxwLmh0lO",
    amount: total * 100,
    currency: "INR",
    name: "Reddy Gari Biryani",
    description: "Order Payment",
    handler: async function (response) {

      await setDoc(doc(db,"orders",orderId), {
        name: nameVal,
        phone: phoneVal,
        address: addressVal,
        items: cart,
        total,
        payMethod:"Online",
        paymentStatus:"paid",
        razorpayPaymentId: response.razorpay_payment_id,
        status:"accepted",
        timestamp: Date.now()
      });

      localStorage.setItem("lastOrderId", orderId);
      localStorage.removeItem("cart");

      window.location.href = "order-success.html";
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();
};

</script>
</body>
</html>

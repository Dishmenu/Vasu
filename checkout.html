<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<style>
body {
  margin: 0;
  padding: 40px 6%;
  font-family: Poppins, sans-serif;
  background: #fff9f3;
}

.checkout-page h2 {
  text-align: center;
  margin-bottom: 25px;
}

.checkout-container {
  display: flex;
  gap: 25px;
}

/* -------------- SUMMARY BOX -------------- */
.order-summary {
  width: 40%;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

.order-summary h3 {
  margin-bottom: 10px;
}

.summary-item {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 16px;
}

.summary-total {
  display: flex;
  justify-content: space-between;
  font-size: 18px;
  font-weight: 700;
  margin-top: 12px;
}

/* -------------- CHECKOUT FORM -------------- */
.checkout-form {
  width: 60%;
  background: #fff;
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

.checkout-form label {
  display: block;
  margin: 12px 0 6px;
  font-size: 15px;
}

.checkout-form input,
.checkout-form textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-bottom: 10px;
  font-size: 15px;
}

.checkout-form button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  background: #c62828;
  border: none;
  color: #fff;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
}

/* -------------- MOBILE -------------- */
@media (max-width: 768px) {
  .checkout-container {
    flex-direction: column;
  }

  .order-summary {
    width: 100%;
    order: 1;
  }

  .checkout-form {
    width: 100%;
    order: 2;
  }
}
</style>
<body>

<section class="checkout-page">

  <h2>Checkout</h2>

  <div class="checkout-container">

    <!-- SUMMARY FIRST IN MOBILE -->
    <div class="order-summary">
      <h3>Your Order</h3>
      <div id="summaryItems"></div>

      <div class="summary-total">
        <p>Subtotal:</p>
        <p id="summaryTotal">₹0</p>
      </div>
    </div>

    <!-- FORM -->
    <div class="checkout-form">
      <h3>Delivery Details</h3>

      <label>Full Name</label>
      <input id="name" type="text">

      <label>Phone</label>
      <input id="phone" type="text">

      <label>Address</label>
      <textarea id="address"></textarea>

      <button onclick="placeOrder()">Place Order</button>
    </div>

  </div>

</section>
<script type="module">

/* ----------------------------------------------------
   FIREBASE IMPORTS
---------------------------------------------------- */
import { initializeApp } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
  getFirestore, 
  collection, 
  addDoc, 
  serverTimestamp 
} 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


/* ----------------------------------------------------
   FIXED FIREBASE CONFIG (YOURS)
---------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
  authDomain: "reddy-gari-biryani.firebaseapp.com",
  projectId: "reddy-gari-biryani",
  storageBucket: "reddy-gari-biryani.appspot.com",
  messagingSenderId: "83117980930",
  appId: "1:83117980930:web:5672bbedf6f8aafb88961b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);


/* ----------------------------------------------------
   LOAD CART (THE CORRECT KEY IS "cart")
---------------------------------------------------- */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const summaryItems = document.getElementById("summaryItems");
const summaryTotal = document.getElementById("summaryTotal");


/* ----------------------------------------------------
   RENDER SUMMARY BOX
---------------------------------------------------- */
function renderSummary() {
  let total = 0;
  summaryItems.innerHTML = "";

  cart.forEach(item => {
    const itemTotal = item.qty * item.price;
    total += itemTotal;

    summaryItems.innerHTML += `
      <div class="summary-item">
        <span>${item.name} × ${item.qty}</span>
        <span>₹${itemTotal}</span>
      </div>
    `;
  });

  summaryTotal.textContent = "₹" + total;
}

renderSummary();


/* ----------------------------------------------------
   PLACE ORDER → SAVE TO FIRESTORE
   THIS IS FULL VERSION: CLEAN + WORKING
---------------------------------------------------- */
window.placeOrder = async function () {

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();

  if (!name || !phone || !address) {
    alert("Please fill all fields");
    return;
  }

  if (cart.length === 0) {
    alert("Your cart is empty.");
    return;
  }

  // Convert ₹500 string into number
  const totalAmount = Number(summaryTotal.textContent.replace("₹", ""));

  const order = {
    name,
    phone,
    address,
    items: cart,
    total: totalAmount,
    status: "pending",
    timestamp: serverTimestamp()
  };

  // SAVE ORDER TO FIRESTORE
  const ref = await addDoc(collection(db, "orders"), order);

  // SAVE orderId locally for tracking
  localStorage.setItem("orderId", ref.id);
  // store order id locally for My Orders
  let history = JSON.parse(localStorage.getItem("historyOrders")) || [];
  history.push(ref.id);
  localStorage.setItem("historyOrders", JSON.stringify(history));

  // CLEAR CART
  localStorage.removeItem("cart");

  // REDIRECT TO SUCCESS PAGE
  window.location.href = "order-success.html";
};
</script>
</body>
</html>

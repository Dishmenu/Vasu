<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Reddy Gari Biryani Admin</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

#loginBox,#adminPanel{
background:white;
padding:20px;
max-width:600px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
cursor:pointer;
}

.menu-item{
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid #ddd;
padding:10px;
}

.menu-item img{
width:60px;
height:60px;
object-fit:cover;
border-radius:6px;
}

</style>

</head>

<body>

<div id="loginBox">

<h2>Admin Login</h2>

<input id="email" placeholder="Admin Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<div id="adminPanel" style="display:none">

<h2>Menu Manager</h2>

<button onclick="logout()">Logout</button>

<h3>Add Menu Item</h3>

<input id="name" placeholder="Item name">

<input id="price" type="number" placeholder="Price">

<select id="category">

<option>Biryani</option>
<option>Rice</option>
<option>Starters</option>
<option>Drinks</option>

</select>

<input type="file" id="image">

<button onclick="addItem()">Add Item</button>

<h3>Menu Items</h3>

<div id="menuList"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";


const firebaseConfig = {
  apiKey: "AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
  authDomain: "reddy-gari-biryani.firebaseapp.com",
  projectId: "reddy-gari-biryani",
  storageBucket: "reddy-gari-biryani.firebasestorage.app",
  messagingSenderId: "83117980930",
  appId: "1:83117980930:web:5672bbedf6f8aafb88961b"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const db = getFirestore(app);

const storage = getStorage(app);


window.login = async ()=>{

await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

}


window.logout = async ()=>{

await signOut(auth);

}


onAuthStateChanged(auth,user=>{

if(user){

loginBox.style.display="none";
adminPanel.style.display="block";

loadMenu();

}else{

loginBox.style.display="block";
adminPanel.style.display="none";

}

})


window.addItem = async ()=>{

const file = image.files[0];

if(!file){

alert("Upload image");
return;

}

if(file.size > 2 * 1024 * 1024){

alert("Image must be under 2MB");
return;

}

const imageRef = ref(storage,"menu/"+Date.now()+".webp");

await uploadBytes(imageRef,file);

const url = await getDownloadURL(imageRef);

await addDoc(collection(db,"menu"),{

name:name.value,
price:Number(price.value),
category:category.value,
image:url,
available:true,
timestamp:Date.now()

});

name.value="";
price.value="";
image.value="";

loadMenu();

}


async function loadMenu(){

const snapshot = await getDocs(collection(db,"menu"));

menuList.innerHTML="";

snapshot.forEach(docSnap=>{

const data = docSnap.data();
const id = docSnap.id;

const div = document.createElement("div");

div.className="menu-item";

div.innerHTML=`

<img src="${data.image}">

<span>${data.name} ₹${data.price}</span>

<div>

<button onclick="toggleItem('${id}',${!data.available})">

${data.available ? "Disable" : "Enable"}

</button>

<button onclick="deleteItem('${id}')">

Delete

</button>

</div>

`;

menuList.appendChild(div);

});

}


window.toggleItem = async (id,status)=>{

await updateDoc(doc(db,"menu",id),{
available:status
});

loadMenu();

}


window.deleteItem = async (id)=>{

if(!confirm("Delete item?")) return;

await deleteDoc(doc(db,"menu",id));

loadMenu();

}

</script>

</body>
</html>

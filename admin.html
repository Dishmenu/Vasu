<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Restaurant Admin</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
background:#c62828;
color:white;
border:none;
cursor:pointer;
}

.menuItem{
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #eee;
padding:10px 0;
}

.menuItem img{
width:60px;
height:60px;
object-fit:cover;
border-radius:5px;
}

.orderCard{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="card" id="loginBox">

<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="adminPanel" style="display:none">

<div class="card">

<h3>Add Menu Item</h3>

<input id="name" placeholder="Item name">

<input id="price" type="number" placeholder="Price">

<select id="category">
<option>Biryani</option>
<option>Rice</option>
<option>Starter</option>
<option>Drink</option>
</select>

<input type="file" id="image">

<button onclick="addItem()">Add Item</button>

</div>

<div class="card">

<h3>Menu Items</h3>

<div id="menuList"></div>

</div>

<div class="card">

<h3>Orders</h3>

<div id="ordersList"></div>

</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<audio id="alarm">
<source src="alert.mp3">
</audio>

<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

  apiKey: "AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
  authDomain: "reddy-gari-biryani.firebaseapp.com",
  projectId: "reddy-gari-biryani"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth();
const db = getFirestore();

const alarm = document.getElementById("alarm");

window.login = async ()=>{

try{

await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

}catch(e){

alert(e.message);

}

};

window.logout = async ()=>{

await signOut(auth);

};

onAuthStateChanged(auth,user=>{

if(user){

loginBox.style.display="none";
adminPanel.style.display="block";

loadMenu();
listenOrders();

}else{

loginBox.style.display="block";
adminPanel.style.display="none";

}

});

async function uploadImage(file){

const formData = new FormData();

formData.append("file",file);
formData.append("upload_preset","menu_upload");

const res = await fetch(
"https://api.cloudinary.com/v1_1/ddf7lhtbe/image/upload",
{
method:"POST",
body:formData
});

const data = await res.json();

return data.secure_url;

}

window.addItem = async ()=>{

const file = image.files[0];

if(!file){

alert("Select image");
return;

}

const imageURL = await uploadImage(file);

await addDoc(collection(db,"menu"),{

name:name.value,
price:Number(price.value),
category:category.value,
image:imageURL,
available:true,
timestamp:Date.now()

});

loadMenu();

};

async function loadMenu(){

const snapshot = await getDocs(collection(db,"menu"));

menuList.innerHTML="";

snapshot.forEach(docSnap=>{

const d = docSnap.data();
const id = docSnap.id;

menuList.innerHTML += `
<div class="menuItem">

<img src="${d.image}">

<div>

<b>${d.name}</b><br>
₹${d.price}

</div>

<button onclick="toggleItem('${id}',${!d.available})">

${d.available ? "Disable" : "Enable"}

</button>

<button onclick="deleteItem('${id}')">Delete</button>

</div>
`;

});

}

window.toggleItem = async (id,status)=>{

await updateDoc(doc(db,"menu",id),{
available:status
});

loadMenu();

}

window.deleteItem = async (id)=>{

await deleteDoc(doc(db,"menu",id));

loadMenu();

}

function listenOrders(){

onSnapshot(collection(db,"orders"), snapshot =>{

ordersList.innerHTML="";

snapshot.docChanges().forEach(change=>{

if(change.type === "added"){

alarm.play();

}

});

snapshot.forEach(docSnap=>{

const d = docSnap.data();

ordersList.innerHTML += `
<div class="orderCard">

<b>${d.name}</b><br>
${d.phone}<br>
${d.address}<br>
Total ₹${d.total}

</div>
`;

});

});

}

</script>

</body>

</html>

=<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin</title>

</head>

<body>

<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password">

<button onclick="login()">Login</button>

<div id="adminPanel" style="display:none">

<h3>Add Menu Item</h3>

<input id="name" placeholder="Name">
<input id="price" type="number" placeholder="Price">

<select id="category">
<option value="biryani">Biryani</option>
<option value="starters">Starters</option>
<option value="fry">Fry</option>
<option value="family">Family</option>
<option value="drinks">Drinks</option>
</select>

<input id="image" type="file">

<button onclick="addItem()">Add Item</button>

<hr>

<h3>Menu Items</h3>

<div id="menuList"></div>

<hr>

<h3>Orders</h3>

<div id="ordersList"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
deleteDoc,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey: "AIzaSyCdKXYm3614xbdm0c7B4A9frALspQaTyko",
authDomain: "reddy-gari-biryani.firebaseapp.com",
projectId: "reddy-gari-biryani"
};

const app=initializeApp(firebaseConfig);

const auth=getAuth();
const db=getFirestore();

window.login=async()=>{

await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

};

onAuthStateChanged(auth,user=>{

if(user){
adminPanel.style.display="block";
loadMenu();
listenOrders();
}

});

async function uploadImage(file){

const formData=new FormData();

formData.append("file",file);
formData.append("upload_preset","menu_upload");

const res=await fetch(
"https://api.cloudinary.com/v1_1/ddf7lhtbe/image/upload",
{
method:"POST",
body:formData
});

const data=await res.json();

return data.secure_url;

}

window.addItem=async()=>{

const file=image.files[0];

const imageURL=await uploadImage(file);

await addDoc(collection(db,"menu"),{

name:name.value,
price:Number(price.value),
category:category.value,
image:imageURL,
available:true

});

loadMenu();

};

async function loadMenu(){

const snap=await getDocs(collection(db,"menu"));

menuList.innerHTML="";

snap.forEach(docSnap=>{

const d=docSnap.data();
const id=docSnap.id;

menuList.innerHTML+=`

<div>

<b>${d.name}</b> ₹${d.price}

<button onclick="toggle('${id}',${!d.available})">

${d.available?"Disable":"Enable"}

</button>

<button onclick="removeItem('${id}')">Delete</button>

</div>

`;

});

}

window.toggle=async(id,status)=>{

await updateDoc(doc(db,"menu",id),{
available:status
});

loadMenu();

}

window.removeItem=async(id)=>{

await deleteDoc(doc(db,"menu",id));

loadMenu();

}

function listenOrders(){

onSnapshot(collection(db,"orders"),snap=>{

ordersList.innerHTML="";

snap.forEach(docSnap=>{

const d=docSnap.data();

let itemsHTML="";

d.items.forEach(i=>{
itemsHTML+=`${i.name} × ${i.qty}<br>`;
});

ordersList.innerHTML+=`

<div>

<b>Order ID:</b> ${d.orderId}<br>
${d.name}<br>
${d.phone}<br>

${itemsHTML}

Total ₹${d.total}

<button onclick="status('${docSnap.id}','accepted')">Accept</button>

<button onclick="status('${docSnap.id}','out_for_delivery')">Out</button>

<button onclick="status('${docSnap.id}','delivered')">Delivered</button>

</div>

`;

});

});

}

window.status=async(id,status)=>{

await updateDoc(doc(db,"orders",id),{
status:status
});

}

</script>

</body>
</html>
